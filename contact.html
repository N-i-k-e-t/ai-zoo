<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | AI Zoo</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-content { padding: var(--space-24) 0; min-height: 80dvh; text-align: center; }
    h1 { font-family: var(--font-display); font-size: var(--text-2xl); margin-bottom: var(--space-4); color: var(--purple); }
    p { margin-bottom: var(--space-4); color: var(--text-muted); line-height: 1.6; max-width: 500px; margin-inline: auto; }
    .contact-card { background: var(--surface); padding: var(--space-10); border: 1px solid var(--border); border-radius: var(--radius-xl); margin-top: var(--space-8); }
    .contact-card a { color: var(--primary); font-weight: 700; font-size: var(--text-lg); display: block; margin-top: var(--space-4); }
  </style>
</head>
<body>
<header class="hdr">
  <div class="logo"><a href="index.html">AI <em>Zoo</em></a></div>
</header>
<main class="container-d page-content">
  <h1>Contact the Keepers</h1>
  <p>Have questions about a specific species or interest in a private corporate tour?</p>
  <div class="contact-card">
    <p>For support and inquiries, reach us at:</p>
    <a href="mailto:hello@ai-zoo.io">hello@ai-zoo.io</a>
  </div>
  <a href="index.html" class="btn-s" style="margin-top: var(--space-8)">Back to Park</a>
</main>
<footer><p class="f-copy">&copy; 2026 AI Zoo.</p></footer>
</body>
</html>
